services:
  - type: web
    name: telegram-insights-pro
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: HIDDEN_FORWARDING
        value: "true"
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1